# slopscore's own CI - runs the full suite, including the 0/24 held-out
# never-false-accuse gate, on every push and PR. The linter lints itself.
name: tests
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install . pytest
      - run: pytest -q
