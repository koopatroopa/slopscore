# slopscore's own CI - runs the full suite, including the 0/24 held-out
# never-false-accuse gate, on every push and PR. The linter lints itself.
name: tests
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12"]
        # One macOS leg proves Apple compatibility (POSIX-sh hooks, stdlib
        # engine) without the 10x private-repo minutes of a full cross-product.
        # One Windows leg proves the engine, CLI and Claude Code plugin
        # hook (`slopscore hook claude-commit` - no shell involved) run
        # natively; the git-shim suite is POSIX-by-nature and excluded there
        # (the shims run under Git for Windows' own sh in real use).
        include:
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install . pytest
      - run: pytest -q
        if: runner.os != 'Windows'
      - run: pytest -q --ignore=tests/test_hooks.py
        if: runner.os == 'Windows'
